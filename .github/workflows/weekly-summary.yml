name: Weekly LLM summary

on:
  schedule:
    # Mondays 08:00 UTC (runs after the daily sync of the same morning)
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  models: read

concurrency:
  group: vllm-insights-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN || secrets.GITHUB_TOKEN }}
      GITHUB_REPO: vllm-project/vllm
      DB_PATH: ./data/insights.sqlite
      LLM_BACKEND: github

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/insights.sqlite
          key: vllm-insights-db-${{ github.run_id }}
          restore-keys: |
            vllm-insights-db-

      # If cache is empty we still need data — do a quick incremental sync.
      - name: Ensure data
        run: vllm-insights sync --releases --prs

      - name: Generate weekly summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          mkdir -p docs/weekly
          vllm-insights summarize --out "docs/weekly/${DATE}.md" --days 7
          cp "docs/weekly/${DATE}.md" docs/weekly/latest.md

      - name: Commit summary
        run: |
          git config user.name "vllm-insights-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/weekly/
          if ! git diff --cached --quiet; then
            git commit -m "summary: weekly LLM digest $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No summary changes to commit."
          fi
