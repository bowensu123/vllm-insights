name: Daily sync & publish

on:
  schedule:
    - cron: "0 * * * *"   # every hour, top of the hour UTC
  workflow_dispatch:
    inputs:
      full:
        description: "Full refresh (ignore last_synced_at)"
        type: boolean
        default: false

# Needed for actions/deploy-pages
permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: vllm-insights-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GitHub auto-injects a fresh GITHUB_TOKEN per run; it has plenty of
      # quota for everything we do (public-repo reads + models:read +
      # writing to this repo). The old GH_DATA_TOKEN override was useful for
      # bumping rate limits but caused 401s once the PAT expired, so we no
      # longer fall back to it. To re-enable: add `${{ secrets.GH_DATA_TOKEN
      # }}` here and make sure the PAT is current.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPO: vllm-project/vllm
      DB_PATH: ./data/insights.sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/insights.sqlite
          key: vllm-insights-db-${{ github.run_id }}
          restore-keys: |
            vllm-insights-db-

      - name: Sync (releases / PRs / commits / issues / forks / registry / source-scan)
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            vllm-insights sync --all --full
          else
            vllm-insights sync --all
          fi

      - name: Analyze (links / perf-claims / release-drift / embeddings / clustering)
        env:
          # Embeddings use GitHub Models (text-embedding-3-small via GITHUB_TOKEN).
          # Cluster labeling uses Anthropic Claude — set ANTHROPIC_API_KEY in repo
          # secrets to enable LLM labels; falls back to heuristic labels if absent.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          vllm-insights analyze --pr-issue-links --perf-claims --release-diff || \
            echo "core analyses failed; continuing"
          vllm-insights analyze --embed --cluster || \
            echo "embed/cluster failed; continuing"

      - name: Weekly themed digest (LLM)
        env:
          LLM_BACKEND: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p docs/weekly
          vllm-insights digest --out docs/weekly/latest.md --days 7 --llm
          # Persist a dated archive copy keyed by ISO week so history grows
          # one file per week instead of one per day.
          ISOWEEK=$(date -u +%G-W%V)
          cp docs/weekly/latest.md "docs/weekly/${ISOWEEK}.md"

      - name: Summarize latest release (LLM, cached)
        env:
          LLM_BACKEND: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          vllm-insights summarize-release --tag latest || \
            echo "Release summary failed; continuing"

      - name: Build static site
        run: vllm-insights site --docs docs

      # Commit the weekly markdown + index so the history is browsable on main.
      # The HTML dashboard goes to Pages via artifact upload (not committed).
      - name: Commit weekly digest
        run: |
          git config user.name "vllm-insights-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/weekly/*.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "digest: weekly themed activity $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No digest changes to commit."
          fi

      - name: Send weekly digest email
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          python - <<'PYEOF'
          import os, sys, datetime, pathlib

          api_key = os.getenv("BUTTONDOWN_API_KEY", "").strip()
          if not api_key:
              print("BUTTONDOWN_API_KEY not set; skipping email send")
              sys.exit(0)

          now = datetime.datetime.utcnow()
          isoweek = now.strftime("%G-W%V")

          # Sentinel file tracks which ISO week was last emailed.
          # Stored alongside the SQLite DB (persisted via actions/cache).
          sentinel = pathlib.Path("data/.last-emailed-week")
          if sentinel.exists() and sentinel.read_text().strip() == isoweek:
              print(f"Digest already sent for {isoweek}; skipping")
              sys.exit(0)

          digest_path = pathlib.Path("docs/weekly/latest.md")
          if not digest_path.exists():
              print("No digest found; skipping")
              sys.exit(0)

          import httpx
          content = digest_path.read_text()
          subject = f"vLLM Weekly — {isoweek}"

          resp = httpx.post(
              "https://api.buttondown.com/v1/emails",
              headers={"Authorization": f"Token {api_key}"},
              json={"subject": subject, "body": content, "status": "about_to_send"},
              timeout=30,
          )
          resp.raise_for_status()
          print(f"Digest sent OK (HTTP {resp.status_code}): {subject}")

          sentinel.parent.mkdir(parents=True, exist_ok=True)
          sentinel.write_text(isoweek)
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload SQLite as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: insights-db-${{ github.run_id }}
          path: data/insights.sqlite
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
