name: Daily sync & publish

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:
    inputs:
      full:
        description: "Full refresh (ignore last_synced_at)"
        type: boolean
        default: false

# Needed for actions/deploy-pages
permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: vllm-insights-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN || secrets.GITHUB_TOKEN }}
      GITHUB_REPO: vllm-project/vllm
      DB_PATH: ./data/insights.sqlite

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/insights.sqlite
          key: vllm-insights-db-${{ github.run_id }}
          restore-keys: |
            vllm-insights-db-

      - name: Sync (releases / PRs / commits / issues / forks / registry / source-scan)
        run: |
          if [ "${{ inputs.full }}" = "true" ]; then
            vllm-insights sync --all --full
          else
            vllm-insights sync --all
          fi

      - name: Analyze (PR↔Issue links, release drift, embeddings, clustering, benchmarks)
        env:
          # Optional: embeddings + clustering are skipped if OPENAI_API_KEY is not set.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # PR↔Issue link mining + release drift always run (cheap, no extra creds)
          vllm-insights analyze --pr-issue-links --release-diff || \
            echo "core analyses failed; continuing"
          # Benchmarks: best-effort scrape of perf-CI artifacts
          vllm-insights analyze --benchmarks || \
            echo "benchmarks scrape failed; continuing"
          # Embeddings + clustering: skipped silently if OPENAI_API_KEY is not configured
          if [ -n "${OPENAI_API_KEY}" ]; then
            vllm-insights analyze --embed --cluster || \
              echo "embed/cluster failed; continuing"
          else
            echo "OPENAI_API_KEY not set; skipping topic clustering"
          fi

      - name: Weekly themed digest (LLM)
        env:
          LLM_BACKEND: github
        run: |
          mkdir -p docs/weekly
          vllm-insights digest --out docs/weekly/latest.md --days 7 --llm
          # Persist a dated archive copy keyed by ISO week so history grows
          # one file per week instead of one per day.
          ISOWEEK=$(date -u +%G-W%V)
          cp docs/weekly/latest.md "docs/weekly/${ISOWEEK}.md"

      - name: Summarize latest release (LLM, cached)
        env:
          LLM_BACKEND: github
        run: |
          vllm-insights summarize-release --tag latest || \
            echo "Release summary failed; continuing"

      - name: Build static site
        run: vllm-insights site --docs docs

      # Commit the weekly markdown + index so the history is browsable on main.
      # The HTML dashboard goes to Pages via artifact upload (not committed).
      - name: Commit weekly digest
        run: |
          git config user.name "vllm-insights-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/weekly/*.md 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "digest: weekly themed activity $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No digest changes to commit."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload SQLite as run artifact
        uses: actions/upload-artifact@v4
        with:
          name: insights-db-${{ github.run_id }}
          path: data/insights.sqlite
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
